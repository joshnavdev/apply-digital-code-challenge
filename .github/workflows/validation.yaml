on:
  pull_request:
    branches:
      - main
      - develop
jobs:
  feature:
    name: Validate Feature PR
    runs-on: ubuntu-latest
    steps:
      - name: Initialize Workflow
        uses: actions/checkout@v3
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'pnpm'
      - name: Prepare Container
        run: pnpm install
      - name: Test
        run: pnpm run test
      - name: Run Lint
        run: pnpm run lint
      - name: Run Build
        run: pnpm run build